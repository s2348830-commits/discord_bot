<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Discord Bot Maker</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .fm-row.selected {
            background-color: #2a4d6c !important;
            color: #ffffff;
        }

        .fm-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

    <header>
        <button id="btnOutput" class="btn-start" onclick="toggleBot()">▶</button>
        <button onclick="importCode()">📥インポート</button>
        <button onclick="exportCode()">📥エクスポート</button>
        <button onclick="openFileManager()">📁ファイル</button>
        <button class="btn-link"
            onclick="window.open('https://discord.com/developers/applications', '_blank')">🤖Botリンク</button>
        <button onclick="clearCode()" class="btn-danger">🗑コード全消去</button>
        <button onclick="copyCode()" class="btn-copy">📋コードコピー</button>
    </header>

    <div id="tabsContainer" class="tabs-container"></div>

    <main style="padding: 0; display: flex; flex-direction: column;">
        <div id="editorContainer" style="flex: 1; width: 100%; min-height: 200px; text-align: left;"></div>
    </main>

    <!-- 上下に動かせるリサイザー -->
    <div id="resizer" class="resizer">
        <span class="resizer-grip">≡</span>
    </div>

    <footer id="mainFooter">
        <div id="logArea">サーバーのログを待機中...</div>
        <div class="token-area">
            <label for="tokenInput" id="tokenLabel">BOT TOKEN</label>
            <input type="password" id="tokenInput" placeholder="Tokenを入力...">
        </div>
    </footer>

    <!-- 非表示のインプット要素 -->
    <input type="file" id="fileInput" accept=".js,.txt" onchange="handleFileImport(event)">
    <input type="file" id="imageUploadInput" accept="image/*" onchange="processImageUpload(event)" style="display:none">

    <div id="overlay" class="overlay" onclick="closeFileManager()"></div>
    <div id="fileManagerModal">
        <div class="fm-title-bar">
            <span>📁 image</span>
            <button onclick="closeFileManager()" style="background:none; border:none; cursor:pointer;">✕</button>
        </div>
        <div class="fm-toolbar">
            <button class="fm-btn fm-btn-primary" onclick="triggerImageUpload()">＋ 新規作成</button>
            <div style="height:20px; width:1px; background:#ddd;"></div>
            <button id="btnCut" class="fm-btn" onclick="cutSelectedFile()" disabled>✂ 切り取り</button>
            <button id="btnCopy" class="fm-btn" onclick="copySelectedFile()" disabled>📋 コピー</button>
            <button id="btnPaste" class="fm-btn" onclick="pasteFile()" disabled>📋 貼り付け</button>
            <button id="btnRename" class="fm-btn" onclick="renameSelectedFile()" disabled>✏ 名前変更</button>
            <button id="btnDelete" class="fm-btn" onclick="deleteSelectedFile()" disabled style="color: #ff4d4d;">🗑 削除</button>
        </div>
        <div class="fm-content">
            <table class="fm-table">
                <thead>
                    <tr>
                        <th style="width: 40%;">名前</th>
                        <th>更新日時</th>
                        <th>種類</th>
                        <th>サイズ</th>
                    </tr>
                </thead>
                <tbody id="fileListBody"></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>

    <script>
        const tokenInput = document.getElementById('tokenInput');
        const logArea = document.getElementById('logArea');
        const btnOutput = document.getElementById('btnOutput');
        const fileInput = document.getElementById('fileInput');
        const imgInput = document.getElementById('imageUploadInput');
        const tabsContainer = document.getElementById('tabsContainer');
        const tokenLabel = document.getElementById('tokenLabel');
        const resizer = document.getElementById('resizer');
        const footer = document.getElementById('mainFooter');

        let logPollingInterval = null;
        let db;
        let bots = [];
        let currentBotId = null;
        let runningStatusMap = {};
        let selectedFileName = null;
        let clipboardFile = null;

        const defaultCode = `// eventType: 'MESSAGE' または 'INTERACTION'
// send(channel_id, content, components, embeds): メッセージ送信

if (eventType === 'MESSAGE') {
    if (data.author.bot) return;

    if (data.content === '画像テスト') {
        const embeds = [{
            title: "保存済み画像を表示",
            image: { url: "image\\\\test.png" }
        }];
        send(data.channel_id, "画像を表示します", null, embeds);
    }
}`;

        let editor;
        let isEditorReady = false;

        // リサイザーロジック
        let isResizing = false;
        resizer.addEventListener('mousedown', (e) => {
            isResizing = true;
            document.body.style.cursor = 'ns-resize';
        });
        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const newHeight = window.innerHeight - e.clientY;
            if (newHeight > 50 && newHeight < window.innerHeight - 150) {
                footer.style.height = newHeight + 'px';
                if(editor) editor.layout();
            }
        });
        document.addEventListener('mouseup', () => {
            if(isResizing) {
                isResizing = false;
                document.body.style.cursor = 'default';
                if(editor) editor.layout();
            }
        });

        // Monaco Editor 設定
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
        require(['vs/editor/editor.main'], function () {
            editor = monaco.editor.create(document.getElementById('editorContainer'), {
                value: '',
                language: 'javascript',
                theme: 'vs-dark',
                automaticLayout: true,
                minimap: { enabled: false },
                fontSize: 14,
                wordWrap: 'on',
                scrollBeyondLastLine: false
            });
            editor.onDidChangeModelContent(() => saveCurrentBotToDB());
            isEditorReady = true;
            if (currentBotId && bots.length > 0) {
                const bot = bots.find(b => b.id === currentBotId);
                if (bot && editor.getValue() !== bot.code) editor.setValue(bot.code || '');
            }
        });

        // IndexedDB 設定
        const request = indexedDB.open("BotMakerFiles", 2);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains("images")) db.createObjectStore("images", { keyPath: "name" });
            if (!db.objectStoreNames.contains("bots")) db.createObjectStore("bots", { keyPath: "id" });
        };
        request.onsuccess = (e) => {
            db = e.target.result;
            loadBotsFromDB();
        };

        // --- Botデータ管理 ---
        function loadBotsFromDB() {
            const store = db.transaction(["bots"], "readonly").objectStore("bots");
            const req = store.getAll();
            req.onsuccess = () => {
                bots = req.result;
                if (bots.length === 0) addNewBot();
                else { renderTabs(); switchTab(bots[0].id); }
            };
        }

        function saveCurrentBotToDB() {
            if (!currentBotId || !isEditorReady || !db) return;
            const bot = bots.find(b => b.id === currentBotId);
            if (bot) {
                bot.code = editor.getValue();
                bot.token = tokenInput.value;
                const transaction = db.transaction(["bots"], "readwrite");
                transaction.objectStore("bots").put(bot);
            }
        }

        function addNewBot() {
            const newId = 'bot_' + Date.now();
            const newBot = { id: newId, name: 'Bot ' + (bots.length + 1), code: defaultCode, token: '' };
            bots.push(newBot);
            const transaction = db.transaction(["bots"], "readwrite");
            transaction.objectStore("bots").put(newBot);
            transaction.oncomplete = () => { renderTabs(); switchTab(newId); };
        }

        function deleteBot(id, event) {
            event.stopPropagation();
            if (bots.length <= 1) { alert("最後のBotは削除できません。"); return; }
            if (confirm("このBotを削除しますか？")) {
                bots = bots.filter(b => b.id !== id);
                db.transaction(["bots"], "readwrite").objectStore("bots").delete(id);
                renderTabs(); switchTab(bots[0].id);
            }
        }

        function renderTabs() {
            tabsContainer.innerHTML = '';
            bots.forEach(bot => {
                const tab = document.createElement('div');
                tab.className = 'tab' + (bot.id === currentBotId ? ' active' : '');
                tab.onclick = () => switchTab(bot.id);
                const title = document.createElement('span');
                title.textContent = bot.name;
                const delBtn = document.createElement('span');
                delBtn.className = 'tab-close';
                delBtn.textContent = '✕';
                delBtn.onclick = (e) => deleteBot(bot.id, e);
                tab.appendChild(title); tab.appendChild(delBtn);
                tabsContainer.appendChild(tab);
            });
            const addBtn = document.createElement('div');
            addBtn.className = 'tab-add';
            addBtn.textContent = '＋ 追加';
            addBtn.onclick = addNewBot;
            tabsContainer.appendChild(addBtn);
        }

        function switchTab(id) {
            currentBotId = id;
            const bot = bots.find(b => b.id === id);
            if (bot) {
                if (isEditorReady) {
                    const currentVal = editor.getValue();
                    if (currentVal !== (bot.code || '')) editor.setValue(bot.code || '');
                }
                tokenInput.value = bot.token || '';
                tokenLabel.textContent = bot.name + " TOKEN";
            }
            renderTabs(); updatePlayButton(); fetchLogsImmediately();
        }

        tokenInput.addEventListener('input', saveCurrentBotToDB);

        // --- コード操作機能 ---
        function clearCode() {
            if (isEditorReady && confirm("本当にコードを全て消去しますか？\n※この操作は元に戻せません。")) {
                editor.setValue('');
                saveCurrentBotToDB();
            }
        }

        function copyCode() {
            if (isEditorReady) {
                navigator.clipboard.writeText(editor.getValue())
                    .then(() => alert("コードをクリップボードにコピーしました。"))
                    .catch(err => alert("コピーに失敗しました: " + err));
            }
        }

        // --- ファイルマネージャー機能 ---
        function openFileManager() {
            document.getElementById('fileManagerModal').style.display = 'flex';
            document.getElementById('overlay').style.display = 'block';
            selectedFileName = null; updateToolbarButtons(); refreshFileList();
        }

        function closeFileManager() {
            document.getElementById('fileManagerModal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        function triggerImageUpload() {
            if (!db) { alert("データベースを準備しています。数秒待ってからやり直してください。"); return; }
            imgInput.click();
        }

        async function processImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const imageData = {
                    name: file.name,
                    data: e.target.result,
                    date: new Date().toLocaleString(),
                    type: file.type,
                    size: (file.size / 1024).toFixed(1) + " KB"
                };

                try {
                    const transaction = db.transaction(["images"], "readwrite");
                    const store = transaction.objectStore("images");
                    const putRequest = store.put(imageData);

                    putRequest.onsuccess = () => {
                        selectedFileName = null;
                        updateToolbarButtons();
                        refreshFileList();
                        event.target.value = '';
                    };

                    putRequest.onerror = () => alert("画像の保存に失敗しました。容量不足か、同名のファイルが開かれている可能性があります。");
                } catch (err) {
                    alert("システムエラー: " + err.message);
                }
            };
            reader.readAsDataURL(file);
        }

        function refreshFileList() {
            if (!db) return;
            const tbody = document.getElementById('fileListBody');
            tbody.innerHTML = "";
            const store = db.transaction(["images"], "readonly").objectStore("images");
            store.openCursor().onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    const item = cursor.value;
                    const row = document.createElement('tr');
                    row.className = "fm-row" + (item.name === selectedFileName ? " selected" : "");
                    row.onclick = () => {
                        selectedFileName = (selectedFileName === item.name) ? null : item.name;
                        updateToolbarButtons(); refreshFileList();
                    };
                    row.innerHTML = `<td><img src="${item.data}" class="img-preview">${item.name}</td><td>${item.date}</td><td>${item.type.split('/')[1]} ファイル</td><td>${item.size}</td>`;
                    tbody.appendChild(row); cursor.continue();
                }
            };
        }

        function updateToolbarButtons() {
            const hasSelection = selectedFileName !== null;
            document.getElementById('btnCut').disabled = !hasSelection;
            document.getElementById('btnCopy').disabled = !hasSelection;
            document.getElementById('btnDelete').disabled = !hasSelection;
            document.getElementById('btnRename').disabled = !hasSelection;
            document.getElementById('btnPaste').disabled = clipboardFile === null;
        }

        async function renameSelectedFile() {
            if (!selectedFileName) return;
            const newName = prompt("新しいファイル名を入力してください（拡張子含む）:", selectedFileName);
            if (!newName || newName === selectedFileName) return;

            const existing = await new Promise(res => {
                const check = db.transaction(["images"], "readonly").objectStore("images").get(newName);
                check.onsuccess = () => res(check.result);
            });
            if (existing) { alert("同名のファイルが既に存在します。"); return; }

            const store = db.transaction(["images"], "readonly").objectStore("images");
            const req = store.get(selectedFileName);
            req.onsuccess = () => {
                const data = req.result;
                const newData = { ...data, name: newName, date: new Date().toLocaleString() };
                const putTx = db.transaction(["images"], "readwrite");
                putTx.objectStore("images").put(newData);
                putTx.objectStore("images").delete(selectedFileName);
                putTx.oncomplete = () => {
                    selectedFileName = newName; 
                    updateToolbarButtons(); 
                    refreshFileList();
                };
            };
        }

        function cutSelectedFile() {
            if (!selectedFileName) return;
            const store = db.transaction(["images"], "readonly").objectStore("images");
            const req = store.get(selectedFileName);
            req.onsuccess = () => {
                if (req.result) {
                    clipboardFile = { action: 'cut', data: req.result };
                    const delTx = db.transaction(["images"], "readwrite");
                    delTx.objectStore("images").delete(selectedFileName);
                    delTx.oncomplete = () => {
                        selectedFileName = null;
                        updateToolbarButtons();
                        refreshFileList();
                        alert(`「${clipboardFile.data.name}」を切り取りました。`);
                    };
                }
            };
        }

        function copySelectedFile() {
            if (!selectedFileName) return;
            const store = db.transaction(["images"], "readonly").objectStore("images");
            const req = store.get(selectedFileName);
            req.onsuccess = () => {
                if (req.result) {
                    clipboardFile = { action: 'copy', data: req.result };
                    updateToolbarButtons();
                    alert(`「${clipboardFile.data.name}」をコピーしました。`);
                }
            };
        }

        async function pasteFile() {
            if (!clipboardFile) return;
            const baseData = clipboardFile.data;
            let targetName = baseData.name;

            if (clipboardFile.action === 'copy') {
                const extIndex = targetName.lastIndexOf('.');
                const namePart = extIndex !== -1 ? targetName.substring(0, extIndex) : targetName;
                const extPart = extIndex !== -1 ? targetName.substring(extIndex) : "";
                let counter = 1;
                while (true) {
                    targetName = `${namePart}_コピー${counter}${extPart}`;
                    const existing = await new Promise(res => {
                        const check = db.transaction(["images"], "readonly").objectStore("images").get(targetName);
                        check.onsuccess = () => res(check.result);
                    });
                    if (!existing) break; counter++;
                }
            }

            const newData = { ...baseData, name: targetName, date: new Date().toLocaleString() };
            const putTx = db.transaction(["images"], "readwrite");
            putTx.objectStore("images").put(newData);
            putTx.oncomplete = () => {
                if (clipboardFile.action === 'cut') clipboardFile = null;
                selectedFileName = targetName; updateToolbarButtons(); refreshFileList();
                alert(`「${targetName}」を貼り付けました。`);
            };
        }

        function deleteSelectedFile() {
            if (!selectedFileName) return;
            if (confirm(`「${selectedFileName}」を削除しますか？`)) {
                const tx = db.transaction(["images"], "readwrite");
                tx.objectStore("images").delete(selectedFileName);
                tx.oncomplete = () => { selectedFileName = null; updateToolbarButtons(); refreshFileList(); };
            }
        }

        // --- 実行ロジック ---
        async function resolveImagePaths(code) {
            const pattern = /image[\\\/]+[^"'\)\};,\s]+/g;
            const matches = code.match(pattern);
            if (!matches) return code;

            const images = await new Promise(res => {
                const transaction = db.transaction(["images"], "readonly");
                const req = transaction.objectStore("images").getAll();
                req.onsuccess = () => res(req.result);
            });

            let processedCode = code;
            for (const match of matches) {
                const fileName = match.replace(/^image[\\\/]+/, "");
                const entry = images.find(i => i.name === fileName);

                if (entry) {
                    processedCode = processedCode.split(match).join(entry.data);
                }
            }
            return processedCode;
        }

        function updatePlayButton() {
            const isRunning = runningStatusMap[currentBotId] || false;
            btnOutput.textContent = isRunning ? '■' : '▶';
            btnOutput.className = isRunning ? 'btn-stop' : 'btn-start';
        }

        async function fetchLogsImmediately() {
            try {
                const response = await fetch('/api/logs');
                const data = await response.json();
                runningStatusMap = data.runningBots; 
                updatePlayButton();
                logArea.innerHTML = '';
                
                // 現在選択中のBotIDに対応するログのみを表示
                const currentLogs = data.logs[currentBotId] || [];
                currentLogs.forEach(log => {
                    const div = document.createElement('div');
                    div.style.whiteSpace = "pre-wrap"; // エラーの改行などを維持
                    div.textContent = log; 
                    logArea.appendChild(div);
                });
                logArea.scrollTop = logArea.scrollHeight;
            } catch (e) { }
        }

        function startLogPolling() {
            if (logPollingInterval) return;
            logPollingInterval = setInterval(fetchLogsImmediately, 2000);
        }
        startLogPolling();

        async function toggleBot() {
            if (!currentBotId || !isEditorReady) return;
            const bot = bots.find(b => b.id === currentBotId);
            const token = tokenInput.value.trim();
            const isRunning = runningStatusMap[currentBotId] || false;
            try {
                if (isRunning) {
                    await fetch('/api/stop-bot', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: currentBotId }) });
                } else {
                    if (!token) { alert('トークンが必要です'); return; }
                    const finalCode = await resolveImagePaths(editor.getValue());
                    const res = await fetch('/api/start-bot', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: currentBotId, name: bot.name, token: token, code: finalCode }) });
                    const result = await res.json();
                    if (!result.success) alert('起動エラー: ' + result.error);
                }
            } catch (err) { alert("サーバーとの通信に失敗しました。"); }
        }

        function importCode() { fileInput.click(); }
        function handleFileImport(e) {
            const reader = new FileReader();
            reader.onload = (ev) => { if (isEditorReady) { editor.setValue(ev.target.result); saveCurrentBotToDB(); } };
            reader.readAsText(e.target.files[0]);
        }
        function exportCode() {
            if (!isEditorReady) return;
            const blob = new Blob([editor.getValue()], { type: 'text/javascript' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob); a.download = 'bot_code.js'; a.click();
        }
    </script>
</body>

</html>
