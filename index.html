<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>スマホ向け Discord Bot Maker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <button id="btnOutput" class="btn-start" onclick="toggleBot()">▶</button>
        <button onclick="importCode()">インポート</button>
        <button onclick="exportCode()">エクスポート</button>
        <!-- 追加: Discord Developer Portalへのリンクボタン -->
        <button class="btn-link" onclick="window.open('https://discord.com/developers/applications', '_blank')">Botリンク</button>
    </header>

    <main>
        <textarea id="codeEditor" spellcheck="false" placeholder="ここにJavaScriptコードを入力...">
// msg: 受信したメッセージのデータ
// send(channel_id, content): メッセージを送信する関数

// Bot自身のメッセージには反応しない
if (msg.author.bot) return;

// 「!ping」と送信されたら「Pong!」と返す例
if (msg.content === '!ping') {
    send(msg.channel_id, 'Pong!');
}

// 簡単な返信の例
if (msg.content.includes('なでなで')) {
    send(msg.channel_id, 'えへへ、ありがとう！(HTMLツール稼働中✨)');
}
</textarea>
    </main>

    <footer>
        <div id="logArea"></div>
        <div class="token-area">
            <label for="tokenInput">BOT TOKEN</label>
            <input type="password" id="tokenInput" placeholder="Tokenを入力...">
        </div>
    </footer>

    <input type="file" id="fileInput" accept=".js,.txt" onchange="handleFileImport(event)">

    <script>
        const codeEditor = document.getElementById('codeEditor');
        const tokenInput = document.getElementById('tokenInput');
        const logArea = document.getElementById('logArea');
        const btnOutput = document.getElementById('btnOutput');
        const fileInput = document.getElementById('fileInput');

        let ws = null;
        let isRunning = false;
        let heartbeatInterval = null;
        let sequence = null;

        function log(message) {
            const time = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            div.textContent = `[${time}] ${message}`;
            logArea.appendChild(div);
            logArea.scrollTop = logArea.scrollHeight;
        }

        // Renderスリープ対策 (14分ごとに自身のURLへアクセス)
        setInterval(() => {
            fetch(window.location.href)
                .then(() => console.log('Renderスリープ防止Ping送信完了'))
                .catch(err => console.error('Ping送信エラー:', err));
        }, 14 * 60 * 1000);

        function importCode() {
            fileInput.click();
        }

        function handleFileImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                codeEditor.value = e.target.result;
                log('コードをインポートしました。');
            };
            reader.readAsText(file);
            fileInput.value = '';
        }

        function exportCode() {
            const code = codeEditor.value;
            const blob = new Blob([code], { type: 'text/javascript' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'bot_code.js';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            log('コードをエクスポートしました。');
        }

        function toggleBot() {
            if (isRunning) {
                stopBot();
            } else {
                startBot();
            }
        }

        function stopBot() {
            if (ws) {
                ws.close();
                ws = null;
            }
            if (heartbeatInterval) {
                clearInterval(heartbeatInterval);
                heartbeatInterval = null;
            }
            isRunning = false;
            btnOutput.textContent = '▶';
            btnOutput.className = 'btn-start';
            log('Botを停止しました。');
        }

        function startBot() {
            const token = tokenInput.value.trim();
            const userCode = codeEditor.value;

            if (!token) {
                log('エラー: トークンを右下に入力してください。');
                return;
            }

            isRunning = true;
            btnOutput.textContent = '■';
            btnOutput.className = 'btn-stop';
            log('Discord Gatewayへ接続中...');

            ws = new WebSocket('wss://gateway.discord.gg/?v=10&encoding=json');

            // CORSプロキシを経由してメッセージを送信する関数
            const sendMessage = async (channelId, content) => {
                try {
                    const targetUrl = `https://discord.com/api/v10/channels/${channelId}/messages`;
                    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;

                    const response = await fetch(proxyUrl, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bot ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ content: content })
                    });
                    
                    if (!response.ok) {
                        const errText = await response.text();
                        log(`送信エラー: ${response.status} ${errText}`);
                    } else {
                        console.log(`チャンネル ${channelId} へメッセージを送信しました。`);
                    }
                } catch (e) {
                    log('送信リクエストエラー: ' + e.message);
                }
            };

            const AsyncFunction = Object.getPrototypeOf(async function(){}).constructor;
            let userScriptFunc;
            try {
                userScriptFunc = new AsyncFunction('msg', 'send', userCode);
            } catch (e) {
                log('コードの文法エラー: ' + e.message);
                stopBot();
                return;
            }

            ws.onmessage = async (event) => {
                const payload = JSON.parse(event.data);
                const { t, op, d, s } = payload;

                if (s) sequence = s;

                if (op === 10) {
                    const heartbeatMs = d.heartbeat_interval;
                    heartbeatInterval = setInterval(() => {
                        if (ws.readyState === WebSocket.OPEN) {
                            ws.send(JSON.stringify({ op: 1, d: sequence }));
                        }
                    }, heartbeatMs);

                    ws.send(JSON.stringify({
                        op: 2,
                        d: {
                            token: token,
                            intents: 33281, // MESSAGE_CONTENT等を含む
                            properties: {
                                os: 'linux',
                                browser: 'html_bot_maker',
                                device: 'html_bot_maker'
                            }
                        }
                    }));
                }

                if (op === 0) {
                    if (t === 'READY') {
                        log(`成功: [${d.user.username}] としてログインしました！`);
                    }

                    if (t === 'MESSAGE_CREATE') {
                        try {
                            await userScriptFunc(d, sendMessage);
                        } catch (err) {
                            log('コード実行時エラー: ' + err.message);
                        }
                    }
                }
                
                if (op === 9) {
                    log('セッションが無効です。トークンが間違っている可能性があります。');
                    stopBot();
                }
            };

            ws.onerror = (error) => {
                log('WebSocketエラーが発生しました。');
            };

            ws.onclose = (event) => {
                if (isRunning) {
                    log(`切断されました。(コード: ${event.code})`);
                    stopBot();
                }
            };
        }
    </script>
</body>
</html>
