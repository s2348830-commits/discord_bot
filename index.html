<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>スマホ向け Discord Bot Maker (リモコン版)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <button id="btnOutput" class="btn-start" onclick="toggleBot()">▶</button>
        <button onclick="importCode()">インポート</button>
        <button onclick="exportCode()">エクスポート</button>
        <button class="btn-link" onclick="window.open('https://discord.com/developers/applications', '_blank')">Botリンク</button>
    </header>

    <main>
        <textarea id="codeEditor" spellcheck="false" placeholder="ここにJavaScriptコードを入力...">
// msg: 受信したメッセージのデータ
// send(channel_id, content): メッセージを送信する関数

// Bot自身のメッセージには反応しない
if (msg.author.bot) return;

// 「おみくじ」と送信されたときの処理
if (msg.content === 'おみくじ') {
    const fortunes = ["オグリ吉", "大吉", "中吉", "小吉", "凶", "大凶"];
    const randomIndex = Math.floor(Math.random() * fortunes.length);
    const result = fortunes[randomIndex];
    
    send(msg.channel_id, `${msg.author.username} さんの運勢は……「${result}」です！`);
}

// テスト用のPing-Pong
if (msg.content === '!ping') {
    send(msg.channel_id, 'Pong!');
}
</textarea>
    </main>

    <footer>
        <div id="logArea">サーバーのログを待機中...</div>
        <div class="token-area">
            <label for="tokenInput">BOT TOKEN</label>
            <input type="password" id="tokenInput" placeholder="Tokenを入力...">
        </div>
    </footer>

    <input type="file" id="fileInput" accept=".js,.txt" onchange="handleFileImport(event)">

    <script>
        const codeEditor = document.getElementById('codeEditor');
        const tokenInput = document.getElementById('tokenInput');
        const logArea = document.getElementById('logArea');
        const btnOutput = document.getElementById('btnOutput');
        const fileInput = document.getElementById('fileInput');

        let isRunning = false;
        let logPollingInterval = null;

        // 🔄 2秒ごとにRenderサーバーから「稼働状態」と「ログ」をもらってくる関数
        function startLogPolling() {
            if (logPollingInterval) return;
            logPollingInterval = setInterval(async () => {
                try {
                    const response = await fetch('/api/logs');
                    const data = await response.json();
                    
                    // UIのボタン状態をサーバーと同期する
                    if (data.isRunning !== isRunning) {
                        isRunning = data.isRunning;
                        if (isRunning) {
                            btnOutput.textContent = '■';
                            btnOutput.className = 'btn-stop';
                        } else {
                            btnOutput.textContent = '▶';
                            btnOutput.className = 'btn-start';
                        }
                    }

                    // ログを画面に描画
                    logArea.innerHTML = '';
                    if (data.logs.length === 0 && !isRunning) {
                        logArea.innerHTML = '<div>待機中... トークンを入力して▶を押してください。</div>';
                    } else {
                        data.logs.forEach(logText => {
                            const div = document.createElement('div');
                            div.textContent = logText;
                            logArea.appendChild(div);
                        });
                        // 一番下まで自動スクロール
                        logArea.scrollTop = logArea.scrollHeight;
                    }
                } catch (e) {
                    // 読み込み中のエラーは無視
                }
            }, 2000); 
        }

        // ページを開いた瞬間に監視スタート
        startLogPolling();

        // 📂 ファイル機能（従来通り）
        function importCode() { fileInput.click(); }

        function handleFileImport(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                codeEditor.value = e.target.result;
            };
            reader.readAsText(file);
            fileInput.value = '';
        }

        function exportCode() {
            const code = codeEditor.value;
            const blob = new Blob([code], { type: 'text/javascript' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'bot_code.js';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // 🚀 起動・停止機能（Renderサーバーへ指示を出す）
        async function toggleBot() {
            if (isRunning) {
                // 停止指示を出す
                await fetch('/api/stop-bot', { method: 'POST' });
            } else {
                const token = tokenInput.value.trim();
                const userCode = codeEditor.value;

                if (!token) {
                    alert('右下にトークンを入力してください！');
                    return;
                }
                
                // 起動指示と一緒にコードとトークンを送信する
                await fetch('/api/start-bot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, code: userCode })
                });
                
                // 先行してボタンを赤色に変えておく（ログ取得で最終確定する）
                btnOutput.textContent = '■';
                btnOutput.className = 'btn-stop';
                isRunning = true;
            }
        }
    </script>
</body>
</html>
