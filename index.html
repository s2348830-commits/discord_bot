<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Discord Bot Maker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <button id="btnOutput" class="btn-start" onclick="toggleBot()">▶</button>
        <button onclick="importCode()">📥インポート</button>
        <button onclick="exportCode()">📥エクスポート</button>
        <button onclick="openFileManager()">📁ファイル</button>
        <button class="btn-link" onclick="window.open('https://discord.com/developers/applications', '_blank')">🤖Botリンク</button>
    </header>

    <!-- タブエリアの追加 -->
    <div id="tabsContainer" class="tabs-container">
        <!-- タブがここに動的に生成されます -->
    </div>

    <main>
        <textarea id="codeEditor" spellcheck="false" placeholder="ここにJavaScriptコードを入力..."></textarea>
    </main>

    <footer>
        <div id="logArea">サーバーのログを待機中...</div>
        <div class="token-area">
            <label for="tokenInput" id="tokenLabel">BOT TOKEN</label>
            <input type="password" id="tokenInput" placeholder="Tokenを入力...">
        </div>
    </footer>

    <!-- 隠しインプット -->
    <input type="file" id="fileInput" accept=".js,.txt" onchange="handleFileImport(event)">
    <input type="file" id="imageUploadInput" accept="image/*" onchange="processImageUpload(event)" style="display:none">

    <!-- ファイルマネージャーモーダル -->
    <div id="overlay" class="overlay" onclick="closeFileManager()"></div>
    <div id="fileManagerModal">
        <div class="fm-title-bar">
            <span>📁 image</span>
            <button onclick="closeFileManager()" style="background:none; border:none; cursor:pointer;">✕</button>
        </div>
        <div class="fm-toolbar">
            <button class="fm-btn fm-btn-primary" onclick="triggerImageUpload()">＋ 新規作成</button>
            <div style="height:20px; width:1px; background:#ddd;"></div>
            <button class="fm-btn">✂ 切り取り</button>
            <button class="fm-btn">📋 コピー</button>
            <button class="fm-btn">🗑 削除</button>
        </div>
        <div class="fm-content">
            <table class="fm-table">
                <thead>
                    <tr>
                        <th style="width: 40%;">名前</th>
                        <th>更新日時</th>
                        <th>種類</th>
                        <th>サイズ</th>
                    </tr>
                </thead>
                <tbody id="fileListBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const codeEditor = document.getElementById('codeEditor');
        const tokenInput = document.getElementById('tokenInput');
        const logArea = document.getElementById('logArea');
        const btnOutput = document.getElementById('btnOutput');
        const fileInput = document.getElementById('fileInput');
        const imgInput = document.getElementById('imageUploadInput');
        const tabsContainer = document.getElementById('tabsContainer');
        const tokenLabel = document.getElementById('tokenLabel');
        
        let logPollingInterval = null;
        let db;

        // Bot管理用データ
        let bots = [];
        let currentBotId = null;
        let runningStatusMap = {};

        const defaultCode = `// eventType: 'MESSAGE' または 'INTERACTION'
// send(channel_id, content, components, embeds): メッセージ送信

if (eventType === 'MESSAGE') {
    if (data.author.bot) return;

    if (data.content === '画像テスト') {
        const embeds = [{
            title: "保存済み画像",
            image: { url: "ここにデータURLを貼り付け" }
        }];
        send(data.channel_id, "画像を表示します", null, embeds);
    }
}`;

        // --- IndexedDB 初期化 (画像＆Bot設定保存用) ---
        const request = indexedDB.open("BotMakerFiles", 2);
        request.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains("images")) {
                db.createObjectStore("images", { keyPath: "name" });
            }
            if (!db.objectStoreNames.contains("bots")) {
                db.createObjectStore("bots", { keyPath: "id" });
            }
        };
        request.onsuccess = (e) => { 
            db = e.target.result; 
            loadBotsFromDB();
        };

        // --- Botデータ管理 ---
        function loadBotsFromDB() {
            const store = db.transaction(["bots"], "readonly").objectStore("bots");
            const req = store.getAll();
            req.onsuccess = () => {
                bots = req.result;
                if (bots.length === 0) {
                    addNewBot(); // 初期Botの作成
                } else {
                    renderTabs();
                    switchTab(bots[0].id);
                }
            };
        }

        function saveCurrentBotToDB() {
            if (!currentBotId) return;
            const bot = bots.find(b => b.id === currentBotId);
            if (bot) {
                bot.code = codeEditor.value;
                bot.token = tokenInput.value;
                const transaction = db.transaction(["bots"], "readwrite");
                transaction.objectStore("bots").put(bot);
            }
        }

        function addNewBot() {
            const newId = 'bot_' + Date.now();
            const newBot = {
                id: newId,
                name: 'Bot ' + (bots.length + 1),
                code: defaultCode,
                token: ''
            };
            bots.push(newBot);
            const transaction = db.transaction(["bots"], "readwrite");
            transaction.objectStore("bots").put(newBot);
            transaction.oncomplete = () => {
                renderTabs();
                switchTab(newId);
            };
        }

        function deleteBot(id, event) {
            event.stopPropagation();
            if (bots.length <= 1) {
                alert("最後のBotは削除できません。");
                return;
            }
            if (confirm("このBotを削除しますか？")) {
                bots = bots.filter(b => b.id !== id);
                db.transaction(["bots"], "readwrite").objectStore("bots").delete(id);
                renderTabs();
                switchTab(bots[0].id);
            }
        }

        // --- タブUI制御 ---
        function renderTabs() {
            tabsContainer.innerHTML = '';
            bots.forEach(bot => {
                const tab = document.createElement('div');
                tab.className = 'tab' + (bot.id === currentBotId ? ' active' : '');
                tab.onclick = () => switchTab(bot.id);

                const title = document.createElement('span');
                title.textContent = bot.name;
                
                const delBtn = document.createElement('span');
                delBtn.className = 'tab-close';
                delBtn.textContent = '✕';
                delBtn.onclick = (e) => deleteBot(bot.id, e);

                tab.appendChild(title);
                tab.appendChild(delBtn);
                tabsContainer.appendChild(tab);
            });

            const addBtn = document.createElement('div');
            addBtn.className = 'tab-add';
            addBtn.textContent = '＋ 追加';
            addBtn.onclick = addNewBot;
            tabsContainer.appendChild(addBtn);
        }

        function switchTab(id) {
            currentBotId = id;
            const bot = bots.find(b => b.id === id);
            if (bot) {
                codeEditor.value = bot.code || '';
                tokenInput.value = bot.token || '';
                tokenLabel.textContent = bot.name + " TOKEN";
            }
            renderTabs();
            updatePlayButton();
        }

        // 入力時に自動保存
        codeEditor.addEventListener('input', saveCurrentBotToDB);
        tokenInput.addEventListener('input', saveCurrentBotToDB);

        // --- ファイルマネージャー制御 ---
        function openFileManager() {
            document.getElementById('fileManagerModal').style.display = 'flex';
            document.getElementById('overlay').style.display = 'block';
            refreshFileList();
        }

        function closeFileManager() {
            document.getElementById('fileManagerModal').style.display = 'none';
            document.getElementById('overlay').style.display = 'none';
        }

        function triggerImageUpload() { imgInput.click(); }

        async function processImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const imageData = {
                    name: file.name,
                    data: e.target.result,
                    date: new Date().toLocaleString(),
                    type: file.type,
                    size: (file.size / 1024).toFixed(1) + " KB"
                };
                const transaction = db.transaction(["images"], "readwrite");
                transaction.objectStore("images").put(imageData);
                transaction.oncomplete = () => refreshFileList();
            };
            reader.readAsDataURL(file);
        }

        function refreshFileList() {
            const tbody = document.getElementById('fileListBody');
            tbody.innerHTML = "";
            const store = db.transaction(["images"], "readonly").objectStore("images");
            store.openCursor().onsuccess = (e) => {
                const cursor = e.target.result;
                if (cursor) {
                    const item = cursor.value;
                    const row = document.createElement('tr');
                    row.className = "fm-row";
                    row.onclick = () => {
                        navigator.clipboard.writeText(item.data);
                        alert("画像URLをコピーしました！");
                    };
                    row.innerHTML = `
                        <td><img src="${item.data}" class="img-preview">${item.name}</td>
                        <td>${item.date}</td>
                        <td>${item.type.split('/')[1]} ファイル</td>
                        <td>${item.size}</td>
                    `;
                    tbody.appendChild(row);
                    cursor.continue();
                }
            };
        }

        // --- Bot 制御機能 ---
        function updatePlayButton() {
            const isRunning = runningStatusMap[currentBotId] || false;
            btnOutput.textContent = isRunning ? '■' : '▶';
            btnOutput.className = isRunning ? 'btn-stop' : 'btn-start';
        }

        function startLogPolling() {
            if (logPollingInterval) return;
            logPollingInterval = setInterval(async () => {
                try {
                    const response = await fetch('/api/logs');
                    const data = await response.json();
                    
                    // 個別Botの稼働状態を更新
                    runningStatusMap = data.runningBots;
                    updatePlayButton();

                    // ログエリアの更新
                    logArea.innerHTML = '';
                    data.logs.forEach(log => {
                        const div = document.createElement('div');
                        div.textContent = log;
                        logArea.appendChild(div);
                    });
                    logArea.scrollTop = logArea.scrollHeight;
                } catch (e) {}
            }, 2000); 
        }
        startLogPolling();

        async function toggleBot() {
            if (!currentBotId) return;
            const bot = bots.find(b => b.id === currentBotId);
            const token = tokenInput.value.trim();
            const isRunning = runningStatusMap[currentBotId] || false;

            try {
                if (isRunning) {
                    // 特定のBotだけを停止するリクエスト
                    await fetch('/api/stop-bot', { 
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ id: currentBotId })
                    });
                } else {
                    if (!token) { alert('トークンが必要です'); return; }
                    // 固有IDと名前を付与して起動リクエスト
                    const res = await fetch('/api/start-bot', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            id: currentBotId,
                            name: bot.name,
                            token: token, 
                            code: codeEditor.value 
                        })
                    });
                    
                    // 修正箇所: サーバーからのレスポンスを検証し、エラーがあれば通知
                    const text = await res.text();
                    try {
                        const result = JSON.parse(text);
                        if (!result.success) {
                            alert('起動エラー: ' + result.error);
                        }
                    } catch(e) {
                        console.error("予期せぬレスポンス:", text);
                    }
                }
            } catch (err) {
                alert("サーバーとの通信に失敗しました。サーバーが起動しているか確認してください。");
            }
        }

        function importCode() { fileInput.click(); }
        function handleFileImport(e) {
            const reader = new FileReader();
            reader.onload = (ev) => { 
                codeEditor.value = ev.target.result; 
                saveCurrentBotToDB();
            };
            reader.readAsText(e.target.files[0]);
        }
        function exportCode() {
            const blob = new Blob([codeEditor.value], { type: 'text/javascript' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob); a.download = 'bot_code.js';
            a.click();
        }
    </script>
</body>
</html>
